<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>NEXDROP - Premium Resources</title>

    <!-- ফন্ট এবং আইকন প্যাক -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* প্রিমিয়াম ব্যালেন্সড কালার থিম */
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --accent-color: #6366f1;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        html, body { overflow-x: hidden; width: 100%; position: relative; margin: 0; padding: 0; background: var(--bg-light); font-family: 'Poppins', sans-serif; }
        
        header { background: var(--primary-gradient); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2); height: 60px; box-sizing: border-box; }

        /* লোগো ঢেউ এনিমেশন */
        .logo { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 900; text-transform: uppercase; color: #ffffff; position: relative; cursor: pointer; letter-spacing: 1px; display: inline-block; user-select: none; line-height: 1; }
        .logo::before { content: "NEXDROP"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: #22d3ee; overflow: hidden; animation: animateWaveLogo 4s ease-in-out infinite; }
        @keyframes animateWaveLogo {
            0%, 100% { clip-path: polygon(0% 45%, 15% 44%, 32% 50%, 54% 60%, 70% 61%, 84% 59%, 100% 52%, 100% 100%, 0% 100%); }
            50% { clip-path: polygon(0% 60%, 16% 65%, 34% 66%, 51% 62%, 67% 50%, 84% 45%, 100% 46%, 100% 100%, 0% 100%); }
        }

        /* সার্চ বার */
        .search-wrapper { display: flex; align-items: center; position: relative; }
        .search-input-box { width: 0; overflow: hidden; transition: 0.4s; }
        .search-wrapper.active .search-input-box { width: 150px; margin-right: 5px; }
        .search-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #fff; color: #fff; outline: none; padding: 2px 0; font-size: 13px; }
        .search-btn { background: none; border: none; color: #ffffff; font-size: 18px; cursor: pointer; }

        /* সাইডবার */
        #sidebar { position: fixed; left: -280px; top: 0; width: 275px; height: 100%; background: #ffffff; z-index: 2001; transition: 0.4s ease; box-shadow: 5px 0 25px rgba(0,0,0,0.1); overflow-y: auto; }
        #sidebar.active { left: 0; }
        .sidebar-header { background: var(--primary-gradient); color: white; padding: 25px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #sidebar a { display: flex; align-items: center; padding: 14px 20px; color: #334155; text-decoration: none; border-bottom: 1px solid #f1f5f9; font-weight: 500; font-size: 14px; cursor: pointer; transition: 0.3s; gap: 12px; }
        #sidebar a:hover { background: #f5f3ff; color: var(--accent-color); }
        #sidebar a i { font-size: 18px; width: 25px; text-align: center; }

        .fa-youtube { color: #ff0000; }
        .fa-facebook { color: #1877f2; }
        .fa-telegram { color: #0088cc; }

        /* আধুনিক অ্যাডমিন ডিজাইন */
        .admin-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dark); padding: 5px 15px 12px 15px; font-weight: 600; }
        .admin-avatar-wrap { position: relative; width: 26px; height: 26px; }
        .admin-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--accent-color); }
        .verified-badge { position: absolute; bottom: -2px; right: -2px; background: #fff; color: #0ea5e9; border-radius: 50%; font-size: 10px; border: 1px solid #e2e8f0; }

        /* স্লাইডার */
        .slider-container { width: 95%; max-width: 1100px; margin: 15px auto; overflow: hidden; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
        .slides { display: flex; width: 300%; transition: transform 0.8s ease-in-out; }
        .slide { width: 33.333%; }
        .slide img { width: 100%; height: 190px; object-fit: cover; display: block; background: #e2e8f0; }

        .main-wrapper { max-width: 1100px; margin: 0 auto; padding: 10px; min-height: 80vh; }
        .post-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
        .card { background: #fff; border-radius: 14px; overflow: hidden; border: 1px solid #e2e8f0; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-bottom: 10px; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-title { padding: 12px 15px 5px 15px; font-size: 17px; font-weight: bold; color: var(--text-dark); line-height: 1.4; }

        /* প্রম্পট বক্স */
        .prompt-box { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 15px; padding: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .prompt-img { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #f1f5f9; }
        .prompt-container { position: relative; margin-top: 12px; }
        .prompt-text-box { background: #f8fafc; padding: 15px; padding-right: 48px; border-radius: 12px; border: 1px dashed var(--accent-color); font-size: 13px; color: #334155; font-style: italic; max-height: 140px; overflow-y: auto; line-height: 1.6; }
        .corner-copy-btn { position: absolute; top: 10px; right: 10px; background: var(--accent-color); color: #fff; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }

        /* রিলেটেড পোস্ট */
        .related-section { margin-top: 30px; border-top: 1.5px solid #f1f5f9; padding-top: 20px; }
        .related-title { font-size: 15px; font-weight: 700; color: var(--accent-color); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .related-card { display: flex; align-items: center; background: #fff; padding: 10px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; }
        .related-card img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-right: 15px; }

        /* বাটনস */
        .btn-container { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .download-btn { width: 100%; max-width: 320px; height: 52px; background: var(--accent-color); color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; text-decoration: none; text-transform: uppercase; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25); }
        .tg-btn-control { background: #0ea5e9 !important; color: white !important; width: 100%; max-width: 320px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-weight: 600; text-decoration: none; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25); }

        /* লোডার */
        #site-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.25s; }
        #site-loader.active { opacity: 1; pointer-events: auto; }
        .site-spinner { width: 45px; height: 45px; border: 4px solid #f1f5f9; border-top: 4px solid var(--accent-color); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { background: #f5f3ff; padding: 30px 20px; text-align: center; border-top: 1px solid #ddd6fe; margin-top: 40px; color: var(--text-muted); font-size: 13px; }
        #app-detail-view, #prompt-detail-view, #code-detail-view, #preset-detail-view, #video-detail-view { display: none; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="site-loader"><div class="site-spinner"></div></div>

<!-- ইন্টারসটিশিয়াল অ্যাড -->
<div id="interstitial-ad" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column;">
  <div style="position: relative; width: 90%; max-width: 380px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
    <div onclick="closeAd()" style="position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); color: #fff; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px;">&times;</div>
    <a href="#" id="ad-link" target="_blank"><img id="ad-image" src="" style="width:100%; display:block; aspect-ratio: 4/5; object-fit: cover;"/></a>
    <div style="padding: 20px; text-align: center;">
      <button onclick="closeAd()" style="background:var(--accent-color); color:#fff; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-weight:bold; width: 100%;">Continue to Content</button>
    </div>
  </div>
</div>

<div id="sidebar">
  <div class="sidebar-header">NEXDROP MENU <div class="close-btn" onclick="toggleNav()">&times;</div></div>
  <a onclick="showCategory('all')"><i class="fas fa-home"></i> Home</a>
  <a onclick="showCategory('videos')"><i class="fas fa-video"></i> Video Templates</a>
  <a onclick="showCategory('apps')"><i class="fas fa-mobile-alt"></i> Android Apps</a>
  <a onclick="showCategory('presets')"><i class="fas fa-camera-retro"></i> Lightroom Presets</a>
  <a onclick="showCategory('prompts')"><i class="fas fa-robot"></i> AI Prompts</a>
  <a onclick="showCategory('coding')"><i class="fas fa-code"></i> Developer Coding</a>
  
  <a id="ytLinkSidebar" target="_blank"><i class="fab fa-youtube"></i> YouTube Channel</a>
  <a id="fbLink" target="_blank"><i class="fab fa-facebook"></i> Facebook Page</a>
  <a id="tgLinkSidebar" target="_blank"><i class="fab fa-telegram"></i> Telegram Group</a>
</div>

<header>
  <div style="display: flex; align-items: center;">
    <div class="menu-icon" onclick="toggleNav()" style="font-size:24px; color:#fff; margin-right:15px; cursor:pointer;"><i class="fas fa-bars-staggered"></i></div>
    <div class="logo" onclick="location.reload()">NEXDROP</div>
  </div>
  <div class="search-wrapper" id="searchWrapper">
    <div class="search-input-box"><input class="search-input" id="searchInput" oninput="handleYoutubeSearch(this.value)" placeholder="Search anything..." type="text"/></div>
    <button class="search-btn" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
  </div>
</header>

<div class="slider-container" id="mainSlider">
  <div class="slides" id="slideTrack">
    <div class="slide"><img id="slideImg1" src="https://via.placeholder.com/1200x500/e2e8f0/ffffff?text=Banner+1"/></div>
    <div class="slide"><img id="slideImg2" src="https://via.placeholder.com/1200x500/e2e8f0/ffffff?text=Banner+2"/></div>
    <div class="slide"><img id="slideImg3" src="https://via.placeholder.com/1200x500/e2e8f0/ffffff?text=Banner+3"/></div>
  </div>
</div>

<div class="main-wrapper" id="mainWrapper">
  <div id="app-detail-view"></div>
  <div id="prompt-detail-view"></div>
  <div id="code-detail-view"></div>
  <div id="preset-detail-view"></div>
  <div id="video-detail-view"></div>
  
  <div id="firebase-home"></div>
  <div class="post-grid" id="firebase-videos" style="display:none;"></div>
  <div id="firebase-prompts" style="display:none;"></div>
  <div class="post-grid" id="firebase-presets" style="display:none;"></div>
  <div id="firebase-coding" style="display:none;"></div>
  <div class="post-grid" id="firebase-apps" style="display:none;"></div>
</div>

<footer>
  <div style="font-size:18px; font-weight:900; color:var(--accent-color); margin-bottom:8px;">NEXDROP</div>
  <div style="margin-bottom: 15px;">Discover the best tools and templates for your creativity.</div>
  <div>Copyright &copy; <span id="year"></span> | All Rights Reserved</div>
</footer>

<script>
// অটোমেটিক সাল সেট করা
document.getElementById('year').textContent = new Date().getFullYear();

const firebaseConfig = {
    apiKey: "AIzaSyCBSXPnNlB6BTeTCyNrsZkLm-Dq6_f6J0k",
    authDomain: "nexwabapp.firebaseapp.com",
    databaseURL: "https://nexwabapp-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "nexwabapp",
    storageBucket: "nexwabapp.firebasestorage.app",
    messagingSenderId: "288890799429",
    appId: "1:288890799429:web:ea5061d7b9784e786d2a2c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allApps = [], allPrompts = [], allCoding = [], allPresets = [], allVideos = [];
let telegramGlobalLink = "#", adminAvatarUrl = "https://i.ibb.co/L9p6p5f/admin-avatar.png"; 
let clickCount = 0;

// ফায়ারবেস সেটিংস ও ব্যানার লোড
db.ref('settings').on('value', snap => {
    const d = snap.val();
    if(d) {
        telegramGlobalLink = d.tg || "#";
        document.getElementById('fbLink').href = d.fb || "#";
        document.getElementById('tgLinkSidebar').href = telegramGlobalLink;
        document.getElementById('ytLinkSidebar').href = d.yt || "#";
        if(d.adminAvatar) adminAvatarUrl = d.adminAvatar; 
        if(d.adImg) document.getElementById('ad-image').src = d.adImg;
        if(d.adLink) document.getElementById('ad-link').href = d.adLink;
        renderHomeFeed();
    }
});

db.ref('slider').on('value', snap => {
    const d = snap.val();
    if(d) {
        if(d.s1) document.getElementById('slideImg1').src = d.s1;
        if(d.s2) document.getElementById('slideImg2').src = d.s2;
        if(d.s3) document.getElementById('slideImg3').src = d.s3;
    }
});

function getAdminMeta() {
    return `<div class="admin-meta">
              <div class="admin-avatar-wrap">
                <img class="admin-avatar" src="${adminAvatarUrl}"/>
                <i class="fas fa-check-circle verified-badge"></i>
              </div>
              <div class="admin-text">Admin <span class="admin-badge">Verified</span></div>
            </div>`;
}

const loadData = (path, array, renderFn) => {
    db.ref(path).on('value', snap => {
        array.length = 0; snap.forEach(child => { array.push({ key: child.key, ...child.val() }); });
        renderFn(array); renderHomeFeed();
    });
};

loadData('apps', allApps, renderApps);
loadData('presets', allPresets, renderPresets);
loadData('prompts', allPrompts, renderPrompts);
loadData('coding', allCoding, renderCoding);
loadData('videos', allVideos, renderVideos);

function renderApps(data) { document.getElementById('firebase-apps').innerHTML = data.map(v => `<div class='card' onclick='openAppDetail("${v.key}")'><img src='${v.img}'/><div class='card-title'>${v.title}</div>${getAdminMeta()}</div>`).join(''); }
function renderPresets(data) { document.getElementById('firebase-presets').innerHTML = data.map(v => `<div class='card' onclick='openPresetDetail("${v.key}")'><img src='${v.img}'/><div class='card-title'>${v.title}</div>${getAdminMeta()}</div>`).join(''); }
function renderVideos(data) { document.getElementById('firebase-videos').innerHTML = data.map(v => `<div class='card' onclick='openVideoDetail("${v.key}")'><img src='${v.img}'/><div class='card-title'>${v.title}</div>${getAdminMeta()}</div>`).join(''); }
function renderPrompts(data) { document.getElementById('firebase-prompts').innerHTML = data.map(v => `<div class='card' style='padding:10px;' onclick='openPromptDetail("${v.key}")'><h3 style='font-size:14px;color:var(--accent-color);margin-bottom:10px;'>${v.title}</h3><img src='${v.img}' style='width:100%;border-radius:10px;'/>${getAdminMeta()}</div>`).join(''); }
function renderCoding(data) { document.getElementById('firebase-coding').innerHTML = data.map(v => `<div class='card' style='padding:15px;' onclick='openCodeDetail("${v.key}")'><span><i class='fas fa-file-code'></i> &nbsp; ${v.title}</span>${getAdminMeta()}</div>`).join(''); }

function renderHomeFeed() {
    const container = document.getElementById('firebase-home');
    if (document.getElementById('searchInput').value.trim() !== "") return;
    let combined = [...allApps.map(i=>({...i,type:'app'})),...allPresets.map(i=>({...i,type:'preset'})),...allPrompts.map(i=>({...i,type:'prompt'})),...allVideos.map(i=>({...i,type:'video'}))].sort((a,b)=>a.key<b.key?1:-1);
    container.innerHTML = combined.map(v=>{
        const click = v.type==='app'?`openAppDetail("${v.key}")`:v.type==='preset'?`openPresetDetail("${v.key}")`:v.type==='video'?`openVideoDetail("${v.key}")`:`openPromptDetail("${v.key}")`;
        if(v.type === 'prompt') return `<div class='card' style='padding:10px;' onclick='${click}'><h3 style='font-size:14px;color:var(--accent-color);margin-bottom:8px;'>${v.title}</h3><img src='${v.img}' style='width:100%;border-radius:10px;'/>${getAdminMeta()}</div>`;
        return `<div class='card' onclick='${click}'><img src='${v.img}'/><div class='card-title'>${v.title}</div>${getAdminMeta()}</div>`;
    }).join('');
}

function getRelatedHTML(key, arr, fn) {
    let rel = arr.filter(i => i.key !== key).slice(0, 3);
    if (!rel.length) return "";
    return `<div class="related-section">
              <div class="related-title"><i class="fas fa-th-list"></i> More from this category</div>` + 
              rel.map(i => `<div class="related-card" onclick="${fn}('${i.key}')"><img src="${i.img || 'https://via.placeholder.com/60'}"/><div style="font-size:14px;font-weight:600;color:var(--text-dark);">${i.title}</div></div>`).join('') + 
            `</div>`;
}

function triggerLoading(cb) { const l = document.getElementById('site-loader'); l.classList.add('active'); setTimeout(()=>{if(cb)cb();setTimeout(()=>l.classList.remove('active'),250);},400); }

function openDetailCommon(id, html) {
    clickCount++; if(clickCount % 3 === 0) document.getElementById('interstitial-ad').style.display = 'flex';
    triggerLoading(() => {
        hideAllCategories(); document.getElementById('mainSlider').style.display='none';
        const dv = document.getElementById(id); dv.innerHTML = html; dv.style.display = 'block'; window.scrollTo(0,0);
        if (history.state?.view !== 'detail') history.pushState({view: 'detail'}, "");
    });
}

function openAppDetail(key) {
    const app = allApps.find(a => a.key === key); if(!app) return;
    let html = `<div class='prompt-box'>${getAdminMeta()}<h2>${app.title}</h2><img class='prompt-img' src='${app.img}'/><p style='font-size:14px;color:#444;'>${app.desc||''}</p>
    <div class='btn-container'><a class="download-btn" href="${app.link}" target="_blank">DOWNLOAD NOW</a>
    <a href="${telegramGlobalLink}" target="_blank" class="tg-btn-control"><i class='fab fa-telegram-plane'></i> &nbsp; JOIN TELEGRAM</a></div>
    ${getRelatedHTML(key, allApps, 'openAppDetail')}</div>`;
    openDetailCommon('app-detail-view', html);
}

function openPromptDetail(key) {
    const p = allPrompts.find(i => i.key === key); if(!p) return;
    let html = `<div class='prompt-box'>${getAdminMeta()}<h2>${p.title}</h2><img class='prompt-img' src='${p.img}'/>
    <p style='font-size:13px; color:#555; margin-bottom:10px;'>${p.desc||''}</p>
    <div class='prompt-container'><div class='prompt-text-box' id='p_${p.key}'>${p.text}</div>
    <button class='corner-copy-btn' onclick='copyText("p_${p.key}")'><i class='fas fa-copy'></i></button></div>
    <div class='btn-container'><a href="${telegramGlobalLink}" target="_blank" class="tg-btn-control"><i class='fab fa-telegram-plane'></i> &nbsp; JOIN TELEGRAM</a></div>
    ${getRelatedHTML(key, allPrompts, 'openPromptDetail')}</div>`;
    openDetailCommon('prompt-detail-view', html);
}

function openPresetDetail(key) {
    const p = allPresets.find(i => i.key === key); if(!p) return;
    let html = `<div class='prompt-box'>${getAdminMeta()}<h2>${p.title}</h2><img class='prompt-img' src='${p.img}'/><p>${p.desc||''}</p>
    <div class='btn-container'><a class="download-btn" href="${p.link}" target="_blank">DOWNLOAD PRESET</a>
    <a href="${telegramGlobalLink}" target="_blank" class="tg-btn-control">JOIN TELEGRAM</a></div>
    ${getRelatedHTML(key, allPresets, 'openPresetDetail')}</div>`;
    openDetailCommon('preset-detail-view', html);
}

function openVideoDetail(key) {
    const v = allVideos.find(i => i.key === key); if(!v) return;
    let html = `<div class='prompt-box'>${getAdminMeta()}<h2>${v.title}</h2><img class='prompt-img' src='${v.img}'/><p>${v.desc||''}</p>
    <div class='btn-container'><a class="download-btn" style="background:#8b5cf6" href="${v.link}" target="_blank">CREATE NOW VIDEO</a>
    <a href="${telegramGlobalLink}" target="_blank" class="tg-btn-control">JOIN TELEGRAM</a></div>
    ${getRelatedHTML(key, allVideos, 'openVideoDetail')}</div>`;
    openDetailCommon('video-detail-view', html);
}

function openCodeDetail(key) {
    const c = allCoding.find(i => i.key === key); if(!c) return;
    let html = `<div class='prompt-box'>${getAdminMeta()}<h2>${c.title}</h2>
    <div class='prompt-container'><pre class='prompt-text-box' style='font-family:monospace;font-style:normal;' id='c_${c.key}'>${c.text.replace(/</g,'&lt;')}</pre>
    <button class='corner-copy-btn' onclick='copyText("c_${c.key}")'><i class='fas fa-copy'></i></button></div>
    <div class='btn-container'><a href="${telegramGlobalLink}" target="_blank" class="tg-btn-control">JOIN TELEGRAM</a></div></div>`;
    openDetailCommon('code-detail-view', html);
}

function closeAd() { document.getElementById('interstitial-ad').style.display = 'none'; }

function handleYoutubeSearch(query) {
    const q = query.toLowerCase().trim();
    const container = document.getElementById('firebase-home');
    const slider = document.getElementById('mainSlider');
    if (q === "") { slider.style.display = 'block'; renderHomeFeed(); return; }
    slider.style.display = 'none'; hideAllCategories(); container.style.display = 'block';
    let combined = [...allApps.map(i=>({...i,type:'app'})),...allPresets.map(i=>({...i,type:'preset'})),...allPrompts.map(i=>({...i,type:'prompt'})),...allVideos.map(i=>({...i,type:'video'})),...allCoding.map(i=>({...i,type:'code'}))].filter(i => i.title.toLowerCase().includes(q));
    container.innerHTML = combined.map(v => `<div class='card' onclick='${getClickFn(v.type, v.key)}'><img src='${v.img}'/><div class='card-title'>${v.title}</div>${getAdminMeta()}</div>`).join('');
}

function getClickFn(t, k) { if(t==='app') return `openAppDetail("${k}")`; if(t==='preset') return `openPresetDetail("${k}")`; if(t==='video') return `openVideoDetail("${k}")`; if(t==='prompt') return `openPromptDetail("${k}")`; return `openCodeDetail("${k}")`; }

function hideAllCategories() { ['firebase-home','firebase-apps','firebase-prompts','firebase-coding','firebase-presets','firebase-videos'].forEach(id=>document.getElementById(id).style.display='none'); }

function handleGlobalClick(e) { const s = document.getElementById('sidebar'); if (s.classList.contains('active') && !s.contains(e.target) && !e.target.closest('.menu-icon')) s.classList.remove('active'); if (e.target.id === 'mainWrapper' && isAnyDetailOpen()) closeAllDetails(); }

function isAnyDetailOpen() { return ['app-detail-view','prompt-detail-view','code-detail-view','preset-detail-view','video-detail-view'].some(id => document.getElementById(id).style.display === 'block'); }

function closeAllDetails(isBackAction = false) { triggerLoading(()=>{ ['app-detail-view','prompt-detail-view','code-detail-view','preset-detail-view','video-detail-view'].forEach(id=>document.getElementById(id).style.display='none'); document.getElementById('mainSlider').style.display = 'block'; document.getElementById('firebase-home').style.display='block'; if (!isBackAction && history.state?.view === 'detail') history.back(); }); }

window.onpopstate = function() { closeAllDetails(true); };

function copyText(id){ navigator.clipboard.writeText(document.getElementById(id).innerText).then(()=>alert("Copied to Clipboard!")); }

function toggleNav(){ document.getElementById('sidebar').classList.toggle('active'); }

function showCategory(cat){ triggerLoading(()=>{ document.getElementById('sidebar').classList.remove('active'); closeAllDetails(true); hideAllCategories(); if(cat==='all'){document.getElementById('firebase-home').style.display='block';document.getElementById('mainSlider').style.display='block';}else{document.getElementById('mainSlider').style.display='none'; document.getElementById('firebase-'+cat).style.display=(cat==='prompts'||cat==='coding'?'block':'grid');}}); }

let curSlide = 0; 
setInterval(()=>{
    const t=document.getElementById('slideTrack');
    if(t && t.offsetParent !== null){
        curSlide=(curSlide+1)%3;
        t.style.transform=`translateX(-${curSlide*33.333}%)`;
    }
}, 4000);

document.getElementById('searchBtn').onclick=()=>{ const sw=document.getElementById('searchWrapper'); sw.classList.toggle('active'); if(sw.classList.contains('active'))document.getElementById('searchInput').focus(); };
</script>
